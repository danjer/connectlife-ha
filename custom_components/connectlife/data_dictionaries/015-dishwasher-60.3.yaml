# ASKO family; reported on an ATAG dishwasher. Labels copied from
# 015-dishwasher-60.2 and not verified on this feature code.
#
# The inherited start button (Actions: 2 alone) has no effect while the machine
# is in standby: there is no armed program for the action to act on. The app
# sends the program selection together with the action, which the appliance
# accepts as a complete "start this program" command, so start does the same
# here. Delay start is fixed to 0 (start now); auto door open follows whatever
# the appliance currently has selected.
buttons:
  - key: start
    write:
      Actions: 2
      Selected_program_id:
        from: Selected_program_id_status
      Program_mode:
        from: Selected_program_mode
        adjust: 1
      Auto_door_open_function:
        from: Selected_program_auto_door_open_function
        adjust: 1
      Delay_start_status: 0
properties:
  - property: Selected_program_id_status
    select:
      options:
        0: eco
        1: auto
        2: intensive
        3: quick_pro
        4: time_program
        5: hygiene
        6: rinse_and_hold
        7: self_cleaning
      command:
        name: Selected_program_id
  - property: Selected_program_mode
    select:
      options:
        0: "not_available"
        2: "normal"
        4: "speed"
        5: "night"
      command:
        name: Program_mode
        adjust: 1
  - property: Time_program_set_duration_status
    select:
      options:
        0: "not_available"
        1: "not_set"
        2: "15_min"
        3: "30_min"
        4: "45_min"
        5: "1_h"
        6: "1_h_30_min"
        7: "2_h"
        8: "2_h_30_min"
      command:
        name: Time_program_set_duration
        adjust: 1
